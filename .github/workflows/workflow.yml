name: CI

on:
  push:
    branches: [main]

jobs:

  lint-job:
    runs-on: ubuntu-latest


    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - name: Run linter (syntax test)
        run: ruff check .



  test-forward-pass-job:
    runs-on: ubuntu-latest
    needs: lint-job

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - run: pip install -r requirements.txt
      - run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: pytest tests/